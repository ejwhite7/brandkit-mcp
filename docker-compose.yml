version: '3.8'

services:
  brandkit-mcp:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - ./brand:/app/brand:ro
      - ./brandkit.config.yaml:/app/brandkit.config.yaml:ro
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  preview:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./brand:/app/brand:ro
      - ./brandkit.config.yaml:/app/brandkit.config.yaml:ro
    environment:
      - NODE_ENV=production
    command: ["node", "dist/cli/index.js", "preview", "--port", "3000"]
    restart: unless-stopped

