name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without leading v). Used only when triggered manually.'
        required: true
        type: string

jobs:
  publish:
    name: npm + MCP Registry
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC for the MCP Registry (and npm provenance)
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Resolve target version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine version from tag or input"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Sync version into package.json and server.json
        run: |
          VERSION='${{ steps.ver.outputs.version }}'
          node -e "
            const fs = require('fs');
            for (const f of ['package.json', 'server.json']) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              j.version = process.env.V;
              if (Array.isArray(j.packages)) {
                for (const p of j.packages) if (p.identifier === 'brandkit-mcp') p.version = process.env.V;
              }
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
            }
          "
        env:
          V: ${{ steps.ver.outputs.version }}

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        run: |
          curl -fL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher
          chmod +x ./mcp-publisher

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate to MCP Registry (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

      - name: Summary
        run: |
          echo "## Published \`brandkit-mcp@${{ steps.ver.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm: https://www.npmjs.com/package/brandkit-mcp/v/${{ steps.ver.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- MCP Registry: https://registry.modelcontextprotocol.io/v0/servers?search=brandkit-mcp" >> "$GITHUB_STEP_SUMMARY"
