name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  smoke-mcp:
    name: MCP smoke test
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Initialize a sample brand
        run: node dist/cli/index.js init . --name "CI Brand" --force
      - name: Validate the sample brand
        run: node dist/cli/index.js validate
      - name: Verify MCP initialize handshake (stdio)
        run: |
          node -e "
          const { spawn } = require('child_process');
          const p = spawn('node', ['dist/cli/index.js', 'serve'], { stdio: ['pipe','pipe','inherit'] });
          let buf = '';
          p.stdout.on('data', d => {
            buf += d.toString();
            if (buf.includes('\"serverInfo\"')) { console.log('MCP handshake OK'); p.kill(); process.exit(0); }
          });
          const req = { jsonrpc:'2.0', id:1, method:'initialize', params:{ protocolVersion:'2024-11-05', capabilities:{}, clientInfo:{ name:'ci', version:'0' } } };
          p.stdin.write(JSON.stringify(req) + '\n');
          setTimeout(() => { console.error('Timed out waiting for initialize response'); p.kill(); process.exit(1); }, 15000);
          "
